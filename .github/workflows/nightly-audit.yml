name: Nightly Security Audit

on:
  schedule:
    # Daily at 06:00 UTC (08:00 Israel)
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: nightly-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Detect Drift
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run audit
        env:
          AUDIT_GH_TOKEN: ${{ secrets.AUDIT_GH_TOKEN }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: python audit/run_audit.py

      - name: Commit updated baseline
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain audit/)" ]; then
            git add audit/baseline.json audit/last_report.md
            git commit -m "chore(audit): update baseline $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No baseline changes."
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.run_id }}
          path: audit/last_report.md
          retention-days: 90
